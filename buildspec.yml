version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin 982920153868.dkr.ecr.ap-southeast-1.amazonaws.com
      - echo Logging in to Docker Hub...
      - docker login -u YOUR_DOCKERHUB_USERNAME -p YOUR_DOCKERHUB_PASSWORD-1.amazonaws.com

  build:
    commands:
      - echo Building the Docker image...
      - docker build -t 2048-game .
      - echo Tagging the Docker image...
      - docker tag 2048-game:latest 982920153868.dkr.ecr.ap-southeast-1.amazonaws.com/2048-game-repo:latest

  post_build:
    commands:
      - echo Pushing the Docker image to Amazon ECR...
      - docker push 982920153868.dkr.ecr.ap-southeast-1.amazonaws.com/2048-game-repo:latest
      - echo Creating imagedefinitions.json file for ECS deployment...
      - echo '[{"name":"2048-container","imageUri":"982920153868.dkr.ecr.ap-southeast-1.amazonaws.com/2048-game-repo:latest"}]' > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json